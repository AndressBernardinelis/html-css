<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family:'Heart' ;
            src: url('fontes/myheart.otf') format('OpenType'), src: ('myheart') format(TrueType);
            font-weight: normal;
            font-syle: normal;


            /* 
            tipos fotmatos ()
            - opentype(otf)
            - trueype(ttf)
            - embedded-opentype
            - truetype-aap (aplle advanced typography)
            - sgv

            */

        }
        
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
           

        h1 {
            font-family: Heart, Times, serif;
             font-size: 3em;
        }
    </style>
</head>
