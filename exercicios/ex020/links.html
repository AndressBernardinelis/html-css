<!DOCTYPE html>
<html lang="pt-br>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* Seletores Personalizados
           . = class
           : pseudo-class
           :: pseudo-element
           > = children
           */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: yellow;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }
        
        a:visited {
            color: blueviolet;
        }
        a:active {
            color: aqua;
        }

        a::after {
            content: '[Link]' ;
            text-decoration: none;
            font-weight: normal;
            color: darkgrey;


        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório Github</a></li>
        <li><a href="https://youtube.com/cursoem video">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com">Site Curso em Vídeo</a></li>
    </ul>
</body>
</html>
