<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em Html5</title>
</head>
<body>
    <h1>Imagens dinâmincas</h1>
    <p>Tente abrir este site em vários dispositivos diferentes ou simplismente aumente a tela do seu navegador</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)"    srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flevível">
    </picture>

    <h1>Reproduzido áudio</h1>
    <p>Vamos reproduzir áudio em HTML5</p>
    <audio preload="auto" autoplay controls>
        <source src="midia/Princess-Bubblegum.mp3.mp3" type="audio/mpeg">
        <p>Infelizmente seu navegador não consegue reproduzir o áudio. <a href="midia/Princess-Bubblegum.mp3.mp3">Clique aqui para baixar o arquivo MP3</a></p>
    </audio>
</body>
</html>
